name: Release builds

# Builds the four distributable installers (Linux AppImage, Windows portable exe,
# macOS arm64 + x64 dmg) and, on a tag push, attaches them to a GitHub Release.
# Manual runs upload artifacts and cut a draft pre-release.
#
# One code path: every runner builds its own native addon for its own platform via
# `scripts/build.mjs --target=<triple>` — the exact script developers run locally —
# then packages with electron-builder. No bash re-implementation of the build.
#
# The native addon (Zig napi) pulls two sibling repos referenced by
# native/build.zig.zon as ../../tide and ../../tide-vcd, so all three repos are
# checked out side-by-side under the workspace root. All three are public, so the
# default GITHUB_TOKEN can read them — no PAT needed.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Static checks (WGSL validation + both TS projects). Gates the release. --
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install naga (WGSL validator)
        run: cargo install naga-cli --locked
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  # ---- Per-platform: build the host-native addon + app, then package. ----------
  build:
    name: ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.os }}
    env:
      # Alpha builds are unsigned: stop electron-builder discovering (and failing
      # on) a macOS signing identity. Harmless on Linux/Windows.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: linux-x64
            eb: --linux
            artifact: riptide-linux-x64
          - name: windows-x64
            os: windows-latest
            target: windows-x64
            eb: --win
            artifact: riptide-windows-x64
          - name: macos-arm64
            os: macos-14
            target: macos-arm64
            eb: --mac --arm64
            artifact: riptide-macos-arm64
          - name: macos-x64
            os: macos-13
            target: macos-x64
            eb: --mac --x64
            artifact: riptide-macos-x64
    steps:
      - name: Checkout riptide
        uses: actions/checkout@v4
        with:
          path: riptide

      - name: Checkout tide
        uses: actions/checkout@v4
        with:
          repository: coderkalyan/tide
          ref: main
          path: tide

      - name: Checkout tide-vcd
        uses: actions/checkout@v4
        with:
          repository: coderkalyan/tide-vcd
          ref: main
          path: tide-vcd

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: riptide/pnpm-lock.yaml

      - name: Install deps
        working-directory: riptide
        run: pnpm install --frozen-lockfile

      - name: Build (native addon + main + renderer)
        working-directory: riptide
        run: node scripts/build.mjs --target=${{ matrix.target }} --mode=release

      - name: Package with electron-builder
        working-directory: riptide
        run: pnpm exec electron-builder ${{ matrix.eb }} --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: riptide/dist/installers/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout riptide (for version)
        uses: actions/checkout@v4
        with:
          path: riptide

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: riptide-*
          path: artifacts

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -p "require('./riptide/package.json').version")
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "name=Riptide ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${ver}-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "name=Riptide v${ver} (CI #${{ github.run_number }})" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
